# SQL 日志导出工具默认配置文件 (请根据需要修改)

[sqllog]
# SQL 日志目录或文件路径
directory = "sqllogs"

[error]
# 解析错误日志输出路径（纯文本行: file | error | raw | line）
file = "export/errors.log"

[logging]
# 应用日志输出目录或文件路径 (当前版本要求为"文件路径"，例如 logs/sqllog2db.log)
# 如果仅设置为目录（如 "logs"），请确保后续代码逻辑能够自动生成文件；否则请填写完整文件路径
file = "logs/sqllog2db.log"
# 日志级别: trace | debug | info | warn | error
level = "info"
# 日志保留天数 (1-365) - 用于滚动文件最大保留数量
retention_days = 7

[features.filters]
# 是否启用过滤器
enable = true

# --- 元数据过滤器 (Record-level: 满足任一条件即保留该条记录) ---
# 过滤时间范围 (格式：2023-01-01 00:00:00)
start_ts = "2025-12-26 13:56:46"
end_ts = "2025-12-26 13:56:47"
# 过滤指定的会话 ID
# sess_ids = ["0x7f41435437a8"]
# 过滤指定的线程 ID (支持模糊匹配)
# thrd_ids = ["2188515"]
# 过滤指定的事务 ID
# trxids = ["44805597", "12507101"]
# 过滤指定的客户端 IP (支持模糊匹配)
# client_ips = ["10.73.64.33"]
# 过滤指定的用户名 (支持模糊匹配)
# usernames = ["MAZGZ1"]
# 过滤指定的语句类型 (支持模糊匹配)
# statements = ["INS", "UPD", "DEL"]
# 过滤指定的应用名称 (支持模糊匹配)
# appnames = ["DMSQL"]

# --- 指标过滤器 (Transaction-level: 满足条件则保留包含该语句的整个事务 - 需要预扫描) ---
[features.filters.indicators]
# 过滤指定的执行 ID (保留整个事务)
# exec_ids = [257809109, 257809110]
# 过滤最小执行时长 (毫秒)
# min_runtime_ms = 1000
# 过滤最小影响行数
# min_row_count = 100

# --- SQL 过滤器 (Transaction-level: 满足模式则保留整个事务 - 需要预扫描) ---
[features.filters.sql]
# 包含模式列表 (SQL 包含任一模式则匹配)
# include_patterns = ["FROM USER_TABLES", "DELETE FROM"]
# 排除模式列表 (SQL 包含任一模式则剔除)
# exclude_patterns = ["SELECT 1", "DUAL"]

[features.replace_parameters]
enable = false
symbols = ["?", ":name", "$1"] # 可选参数占位符样式列表

# ===================== 导出器配置 =====================
# 只能配置一个导出器
# 同时配置多个时，按优先级使用：csv > jsonl > sqlite

# 方案 1: csv 导出（默认）
# [exporter.csv]
# file = "outputs/sqllog.csv"
# overwrite = true
# append = false

# 方案 2: JSONL 导出（JSON Lines 格式，每行一个 JSON 对象）
# [exporter.jsonl]
# file = "export/sqllog2db.jsonl"
# overwrite = true
# append = false

# 方案 3: SQLite 数据库导出
[exporter.sqlite]
database_url = "export/sqllog2db.db"
table_name = "sqllog_records"
overwrite = true
append = false
