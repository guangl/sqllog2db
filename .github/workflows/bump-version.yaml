name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 0.5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Bump version to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git-cliff changelog generation

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Update Cargo.lock
        run: cargo fetch

      - name: Generate CHANGELOG.md
        run: |
          git cliff --tag "v${{ github.event.inputs.version }}" --output CHANGELOG.md

      - name: Commit and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"
